<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>📍 随机坐标比例 · 抓型定位练习</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #1a1e26;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    .app {
      max-width: 1300px;
      width: 100%;
      background: #222730;
      border-radius: 36px;
      box-shadow: 0 20px 36px rgba(0,0,0,0.7), inset 0 0 0 1px #3f4755;
      padding: 22px 22px 28px;
      color: #e3e7f2;
    }
    h1 {
      font-weight: 400;
      font-size: 1.9rem;
      letter-spacing: 2px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 small {
      font-size: 1rem;
      background: #2f3848;
      padding: 4px 16px;
      border-radius: 30px;
      color: #b6c6e0;
      font-weight: 300;
    }
    .subtitle {
      color: #9da9c0;
      margin-bottom: 20px;
      padding-left: 8px;
      border-left: 4px solid #5f8ad4;
    }
    .canvas-row {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 20px;
    }
    .canvas-box {
      flex: 1 1 300px;
      background: #10131a;
      border-radius: 28px;
      padding: 18px 18px 14px;
      box-shadow: inset 0 4px 8px #00000055, 0 8px 12px #00000040;
      border: 1px solid #384153;
    }
    .canvas-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
      padding: 0 6px;
    }
    .canvas-header h3 {
      font-weight: 400;
      color: #ccd6f0;
      font-size: 1.3rem;
    }
    .canvas-header span {
      color: #7f8da3;
      font-size: 0.9rem;
    }
    .canvas-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      background: #1c212b;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 0 0 1px #465162, inset 0 0 0 1px #5d6a7e;
      touch-action: none;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    #refCanvas { z-index: 1; }
    #workCanvas { z-index: 2; }
    .control-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 16px;
      background: #1b212b;
      padding: 14px 20px;
      border-radius: 60px;
      margin-top: 8px;
      border: 1px solid #3e485a;
    }
    .shape-selector {
      display: flex;
      gap: 8px;
      background: #0e121a;
      padding: 4px;
      border-radius: 48px;
    }
    .shape-btn {
      background: transparent;
      border: none;
      color: #a5b3ce;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
    }
    .shape-btn.active {
      background: #3f5e9c;
      color: white;
      box-shadow: 0 2px 8px #1e3a6b;
    }
    .action-group {
      display: flex;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
    }
    button {
      background: #2d3648;
      border: 1px solid #596680;
      color: #ecf0fa;
      padding: 8px 16px;
      border-radius: 36px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 4px #00000030;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: 0.1s;
      white-space: nowrap;
    }
    button:hover {
      background: #42506a;
      border-color: #889bc0;
    }
    .toggle-btn {
      background: #222a36;
    }
    .toggle-btn.active {
      background: #5f8ad4;
      border-color: #aac2ff;
    }
    .stats-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding: 8px 16px;
      background: #1b212bcc;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid #455166;
      color: #bdd0f5;
    }
    .error-badge {
      background: #1f2a3a;
      padding: 6px 18px;
      border-radius: 36px;
      font-size: 1.1rem;
    }
    .error-value {
      font-weight: 700;
      color: #ffd966;
    }
    .hint-text { color: #8599bb; font-size: 0.9rem; }
    .footer-note {
      margin-top: 12px;
      text-align: right;
      color: #6d7d99;
    }
    @media (max-width: 700px) {
      body { padding: 6px; }
      .app { padding: 16px; border-radius: 28px; }
      h1 { font-size: 1.6rem; }
      .control-bar { border-radius: 30px; padding: 12px 14px; }
      .shape-btn { padding: 6px 12px; }
      button { padding: 6px 12px; }
      .action-group { margin-left: 0; }
    }
  </style>
</head>
<body>
<div class="app">
  <h1>
    🎯 坐标·比例定位 
    <small>先定点·后连线</small>
  </h1>
  <div class="subtitle">👆 点击画布放置关键点 · 拖动调整 · 每次图形随机变化</div>

  <div class="canvas-row">
    <div class="canvas-box">
      <div class="canvas-header">
        <h3>📐 参考形状</h3>
        <span>网格辅助观察</span>
      </div>
      <div class="canvas-wrapper" id="refWrapper">
        <canvas id="refCanvas"></canvas>
      </div>
      <div style="margin-top: 10px; color:#9aabca; padding-left:6px;">
        ⚫ 目标点 · 注意相对位置 · 每次不同
      </div>
    </div>
    <div class="canvas-box">
      <div class="canvas-header">
        <h3>✏️ 你的点位</h3>
        <span>点击添加 · 拖拽微调</span>
      </div>
      <div class="canvas-wrapper" id="workWrapper">
        <canvas id="workCanvas"></canvas>
      </div>
    </div>
  </div>

  <div class="control-bar">
    <div class="shape-selector">
      <button class="shape-btn active" data-shape="triangle">🔺 三角形</button>
      <button class="shape-btn" data-shape="house">🏠 房子</button>
      <button class="shape-btn" data-shape="fish">🐟 鱼</button>
    </div>
    <div style="display: flex; gap: 8px;">
      <button id="resetPointsBtn" title="重置当前图形（重新随机）">🔄 新随机</button>
      <button id="undoPointBtn" title="撤销上一个点">↩️ 撤销</button>
    </div>
    <div class="action-group">
      <button id="toggleAnswerBtn" class="toggle-btn">👁️ 显示答案</button>
      <button id="toggleLinesBtn" class="toggle-btn active">🔗 连线</button>
      <button id="toggleGridBtn" class="toggle-btn active">📏 网格</button>
    </div>
  </div>

  <div class="stats-panel">
    <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
      <div class="error-badge">
        📊 平均偏差: <span class="error-value" id="avgErrorDisplay">0.0</span>%
      </div>
      <div class="error-badge">
        🎯 最大偏差: <span class="error-value" id="maxErrorDisplay">0.0</span>%
      </div>
    </div>
    <div class="hint-text">
      <span id="pointCountDisplay">0 / 0</span> 个点
    </div>
  </div>
  <div class="footer-note">
    💡 每次图形都随机缩放/位移/微调 · 锻炼真正的比例判断力
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ----- 基础图形模板（归一化坐标，作为变形基准）-----
    const BASE_SHAPES = {
      triangle: {
        name: '三角形',
        points: [
          { x: 0.50, y: 0.15 },
          { x: 0.20, y: 0.80 },
          { x: 0.80, y: 0.80 }
        ],
        closed: true
      },
      house: {
        name: '房子',
        points: [
          { x: 0.50, y: 0.10 },
          { x: 0.85, y: 0.40 },
          { x: 0.85, y: 0.80 },
          { x: 0.15, y: 0.80 },
          { x: 0.15, y: 0.40 },
          { x: 0.50, y: 0.10 }
        ],
        closed: true
      },
      fish: {
        name: '鱼',
        points: [
          { x: 0.70, y: 0.50 },
          { x: 0.40, y: 0.20 },
          { x: 0.10, y: 0.30 },
          { x: 0.05, y: 0.50 },
          { x: 0.20, y: 0.65 },
          { x: 0.05, y: 0.80 },
          { x: 0.30, y: 0.70 },
          { x: 0.50, y: 0.75 },
          { x: 0.70, y: 0.50 }
        ],
        closed: true
      }
    };

    // 当前图形状态
    let currentShapeKey = 'triangle';
    let targetPoints = [];               // 经过随机变换后的点（归一化）
    let userPoints = [];
    
    // UI元素
    const refCanvas = document.getElementById('refCanvas');
    const workCanvas = document.getElementById('workCanvas');
    const refCtx = refCanvas.getContext('2d');
    const workCtx = workCanvas.getContext('2d');
    
    const shapeBtns = document.querySelectorAll('.shape-btn');
    const resetBtn = document.getElementById('resetPointsBtn');
    const undoBtn = document.getElementById('undoPointBtn');
    const toggleAnswerBtn = document.getElementById('toggleAnswerBtn');
    const toggleLinesBtn = document.getElementById('toggleLinesBtn');
    const toggleGridBtn = document.getElementById('toggleGridBtn');
    const avgErrorSpan = document.getElementById('avgErrorDisplay');
    const maxErrorSpan = document.getElementById('maxErrorDisplay');
    const pointCountSpan = document.getElementById('pointCountDisplay');
    
    let showAnswer = false;
    let showLines = true;
    let showGrid = true;
    
    let isDragging = false;
    let dragIndex = -1;
    let workRect = { width: 0, height: 0 };
    
    // ----- 随机变换函数：基于模板生成新的目标点（每次大小、位置、轻微形变都不同）-----
    function generateRandomShape(baseKey) {
      const base = BASE_SHAPES[baseKey];
      const basePts = base.points;
      
      // 1. 随机缩放 (0.65 ~ 0.95) —— 让大小变化
      const scale = 0.65 + Math.random() * 0.3;
      
      // 2. 随机平移 (保证图形仍在画布内，偏移范围根据缩放调整)
      const maxOffset = (1 - scale) * 0.8;
      const offsetX = (Math.random() * 2 - 1) * maxOffset;
      const offsetY = (Math.random() * 2 - 1) * maxOffset;
      
      // 3. 轻微顶点扰动 (每个点加一点随机抖动，幅度与缩放有关，避免变形太夸张)
      const jitterAmount = 0.02 * scale; 
      
      const newPoints = basePts.map(p => {
        // 先缩放+平移
        let nx = p.x * scale + offsetX;
        let ny = p.y * scale + offsetY;
        
        // 添加细微抖动（让形状有轻微变化，但仍保持基本结构）
        nx += (Math.random() - 0.5) * jitterAmount;
        ny += (Math.random() - 0.5) * jitterAmount;
        
        // 钳位到 [0.05, 0.95] 范围内，避免太靠边
        nx = Math.min(0.95, Math.max(0.05, nx));
        ny = Math.min(0.95, Math.max(0.05, ny));
        
        return { x: nx, y: ny };
      });
      
      return newPoints;
    }
    
    // 切换图形或重置时调用
    function refreshTargetShape() {
      targetPoints = generateRandomShape(currentShapeKey);
      userPoints = [];                // 清空用户点
      drawRefCanvas();
      drawWorkCanvas();
    }
    
    // 只切换图形类型（重新随机）
    function setShape(shapeKey) {
      currentShapeKey = shapeKey;
      shapeBtns.forEach(btn => {
        if (btn.dataset.shape === shapeKey) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      refreshTargetShape();
    }
    
    // 重置（重新生成随机图形，不清除图形类型）
    function resetWithNewRandom() {
      refreshTargetShape();
    }
    
    // ----- 坐标转换工具 -----
    function normToPixel(nx, ny, rect) {
      return { x: nx * rect.width, y: ny * rect.height };
    }
    function pixelToNorm(px, py, rect) {
      return {
        x: Math.min(1, Math.max(0, px / rect.width)),
        y: Math.min(1, Math.max(0, py / rect.height))
      };
    }
    
    // ----- 绘制参考画布 -----
    function drawRefCanvas() {
      const w = refCanvas.width;
      const h = refCanvas.height;
      if (w === 0 || h === 0) return;
      
      refCtx.clearRect(0, 0, w, h);
      if (showGrid) {
        drawGrid(refCtx, w, h, '#3a465e', '#252e3e', 0.6);
      } else {
        refCtx.fillStyle = '#1c212b';
        refCtx.fillRect(0, 0, w, h);
      }
      
      const pts = targetPoints.map(p => normToPixel(p.x, p.y, {width: w, height: h}));
      drawShape(refCtx, pts, SHAPES[currentShapeKey].closed, '#4f7eb0', '#7a9fd0', 0.35);
      
      pts.forEach((p, i) => {
        refCtx.beginPath();
        refCtx.arc(p.x, p.y, Math.max(6, w*0.012), 0, 2*Math.PI);
        refCtx.fillStyle = '#11141c';
        refCtx.shadowColor = '#aaccff';
        refCtx.shadowBlur = 8;
        refCtx.fill();
        refCtx.shadowBlur = 0;
        refCtx.strokeStyle = '#dbe4ff';
        refCtx.lineWidth = 2.5;
        refCtx.stroke();
        refCtx.font = `bold ${Math.max(12, w*0.03)}px 'Segoe UI'`;
        refCtx.fillStyle = '#ffffff';
        refCtx.shadowColor = '#00000080';
        refCtx.shadowBlur = 6;
        refCtx.fillText(i+1, p.x+12, p.y-10);
        refCtx.shadowBlur = 0;
      });
    }
    
    function drawWorkCanvas() {
      const w = workCanvas.width;
      const h = workCanvas.height;
      if (w === 0 || h === 0) return;
      workRect = { width: w, height: h };
      
      workCtx.clearRect(0, 0, w, h);
      if (showGrid) {
        drawGrid(workCtx, w, h, '#3d4b63', '#283040', 0.8);
      } else {
        workCtx.fillStyle = '#1c212b';
        workCtx.fillRect(0, 0, w, h);
      }
      
      // 显示答案（半透明参考点）
      if (showAnswer) {
        const refPixels = targetPoints.map(p => normToPixel(p.x, p.y, workRect));
        refPixels.forEach((p) => {
          workCtx.beginPath();
          workCtx.arc(p.x, p.y, Math.max(5, w*0.01), 0, 2*Math.PI);
          workCtx.fillStyle = '#a0b5d9';
          workCtx.globalAlpha = 0.45;
          workCtx.fill();
          workCtx.globalAlpha = 1.0;
          workCtx.strokeStyle = '#6a85b0';
          workCtx.lineWidth = 1.8;
          workCtx.stroke();
        });
      }
      
      // 连线用户点
      if (showLines && userPoints.length >= 2) {
        const userPixels = userPoints.map(p => normToPixel(p.x, p.y, workRect));
        workCtx.beginPath();
        workCtx.moveTo(userPixels[0].x, userPixels[0].y);
        for (let i=1; i<userPixels.length; i++) {
          workCtx.lineTo(userPixels[i].x, userPixels[i].y);
        }
        if (BASE_SHAPES[currentShapeKey].closed && userPoints.length === targetPoints.length) {
          workCtx.closePath();
        }
        workCtx.strokeStyle = '#f2c75f';
        workCtx.lineWidth = Math.max(3, w*0.006);
        workCtx.stroke();
      }
      
      // 绘制用户点
      const userPixels = userPoints.map(p => normToPixel(p.x, p.y, workRect));
      userPixels.forEach((p, i) => {
        workCtx.beginPath();
        workCtx.arc(p.x, p.y, Math.max(8, w*0.015), 0, 2*Math.PI);
        workCtx.fillStyle = '#f2c75f';
        workCtx.shadowColor = '#ffd966cc';
        workCtx.shadowBlur = 10;
        workCtx.fill();
        workCtx.shadowBlur = 0;
        workCtx.beginPath();
        workCtx.arc(p.x, p.y, Math.max(5, w*0.01), 0, 2*Math.PI);
        workCtx.fillStyle = '#1e2b3c';
        workCtx.fill();
        workCtx.strokeStyle = '#ffe08a';
        workCtx.lineWidth = 2.5;
        workCtx.stroke();
        workCtx.font = `bold ${Math.max(12, w*0.03)}px 'Segoe UI'`;
        workCtx.fillStyle = '#ffffff';
        workCtx.shadowColor = '#000000b0';
        workCtx.shadowBlur = 6;
        workCtx.fillText(i+1, p.x+14, p.y-12);
        workCtx.shadowBlur = 0;
      });
      
      updateStats();
    }
    
    function drawGrid(ctx, w, h, colorMajor, colorMinor, alpha=1.0) {
      const step = w / 10;
      ctx.lineWidth = 1;
      ctx.globalAlpha = alpha;
      for (let i=0; i<=10; i++) {
        const pos = i * step;
        ctx.beginPath();
        ctx.strokeStyle = (i===0 || i===10) ? colorMajor : colorMinor;
        ctx.moveTo(pos, 0); ctx.lineTo(pos, h);
        ctx.moveTo(0, pos); ctx.lineTo(w, pos);
        ctx.stroke();
      }
      ctx.globalAlpha = 1.0;
    }
    
    function drawShape(ctx, points, closed, strokeColor, fillColor, fillAlpha) {
      if (points.length < 2) return;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i=1; i<points.length; i++) ctx.lineTo(points[i].x, points[i].y);
      if (closed) ctx.closePath();
      ctx.fillStyle = fillColor;
      ctx.globalAlpha = fillAlpha;
      ctx.fill();
      ctx.globalAlpha = 1.0;
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = 3.5;
      ctx.stroke();
    }
    
    function computeErrors() {
      if (userPoints.length === 0) return { avg: 0, max: 0 };
      const diag = Math.sqrt(workRect.width**2 + workRect.height**2);
      let total = 0, max = 0;
      const count = Math.min(userPoints.length, targetPoints.length);
      for (let i=0; i<count; i++) {
        const up = userPoints[i];
        const tp = targetPoints[i];
        const dx = (up.x - tp.x) * workRect.width;
        const dy = (up.y - tp.y) * workRect.height;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const errorPercent = (dist / diag) * 100;
        total += errorPercent;
        if (errorPercent > max) max = errorPercent;
      }
      const avg = count>0 ? total/count : 0;
      return { avg, max };
    }
    
    function updateStats() {
      const err = computeErrors();
      avgErrorSpan.textContent = err.avg.toFixed(2);
      maxErrorSpan.textContent = err.max.toFixed(2);
      pointCountSpan.textContent = `${userPoints.length} / ${targetPoints.length}`;
    }
    
    // ----- 画布自适应与交互 (同前，略作调整) -----
    function resizeCanvases() {
      const refWrapper = document.getElementById('refWrapper');
      const workWrapper = document.getElementById('workWrapper');
      const refRect = refWrapper.getBoundingClientRect();
      const workRectVal = workWrapper.getBoundingClientRect();
      if (refRect.width > 0) {
        refCanvas.width = refRect.width;
        refCanvas.height = refRect.height;
      }
      if (workRectVal.width > 0) {
        workCanvas.width = workRectVal.width;
        workCanvas.height = workRectVal.height;
      }
      drawRefCanvas();
      drawWorkCanvas();
    }
    
    function handleWorkPointerDown(e) {
      e.preventDefault();
      const rect = workCanvas.getBoundingClientRect();
      const scaleX = workCanvas.width / rect.width;
      const scaleY = workCanvas.height / rect.height;
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      const canvasX = (clientX - rect.left) * scaleX;
      const canvasY = (clientY - rect.top) * scaleY;
      const norm = pixelToNorm(canvasX, canvasY, workRect);
      
      const threshold = 20 * (workCanvas.width/400);
      let hitIndex = -1;
      userPoints.forEach((p, idx) => {
        const pix = normToPixel(p.x, p.y, workRect);
        if (Math.hypot(pix.x - canvasX, pix.y - canvasY) < threshold) hitIndex = idx;
      });
      
      if (hitIndex !== -1) {
        isDragging = true;
        dragIndex = hitIndex;
        workCanvas.setPointerCapture(e.pointerId);
      } else {
        if (userPoints.length < targetPoints.length) {
          userPoints.push({ x: norm.x, y: norm.y });
          drawWorkCanvas();
        } else {
          alert(`当前图形只有 ${targetPoints.length} 个点，请先重置或撤销`);
        }
      }
    }
    
    function handleWorkPointerMove(e) {
      if (!isDragging || dragIndex === -1) return;
      e.preventDefault();
      const rect = workCanvas.getBoundingClientRect();
      const scaleX = workCanvas.width / rect.width;
      const scaleY = workCanvas.height / rect.height;
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      const canvasX = (clientX - rect.left) * scaleX;
      const canvasY = (clientY - rect.top) * scaleY;
      const norm = pixelToNorm(canvasX, canvasY, workRect);
      userPoints[dragIndex] = { x: norm.x, y: norm.y };
      drawWorkCanvas();
    }
    
    function handleWorkPointerUp(e) {
      e.preventDefault();
      isDragging = false;
      dragIndex = -1;
    }
    
    workCanvas.addEventListener('touchstart', handleWorkPointerDown, { passive: false });
    workCanvas.addEventListener('touchmove', handleWorkPointerMove, { passive: false });
    workCanvas.addEventListener('touchend', handleWorkPointerUp);
    workCanvas.addEventListener('touchcancel', handleWorkPointerUp);
    workCanvas.addEventListener('mousedown', handleWorkPointerDown);
    workCanvas.addEventListener('mousemove', handleWorkPointerMove);
    workCanvas.addEventListener('mouseup', handleWorkPointerUp);
    workCanvas.addEventListener('mouseleave', handleWorkPointerUp);
    
    document.querySelectorAll('.canvas-wrapper').forEach(w => {
      w.addEventListener('touchstart', (e) => { if (e.target === workCanvas || e.target === refCanvas) e.preventDefault(); }, { passive: false });
    });
    
    // 按钮绑定
    resetBtn.addEventListener('click', resetWithNewRandom);
    undoBtn.addEventListener('click', () => {
      userPoints.pop();
      drawWorkCanvas();
    });
    toggleAnswerBtn.addEventListener('click', () => {
      showAnswer = !showAnswer;
      toggleAnswerBtn.classList.toggle('active', showAnswer);
      drawWorkCanvas();
    });
    toggleLinesBtn.addEventListener('click', () => {
      showLines = !showLines;
      toggleLinesBtn.classList.toggle('active', showLines);
      drawWorkCanvas();
    });
    toggleGridBtn.addEventListener('click', () => {
      showGrid = !showGrid;
      toggleGridBtn.classList.toggle('active', showGrid);
      drawRefCanvas();
      drawWorkCanvas();
    });
    shapeBtns.forEach(btn => {
      btn.addEventListener('click', () => setShape(btn.dataset.shape));
    });
    
    window.addEventListener('resize', () => { resizeCanvases(); });
    
    // 初始化随机图形
    (function init() {
      targetPoints = generateRandomShape('triangle');
      setTimeout(() => { resizeCanvases(); }, 30);
    })();
    
    window.addEventListener('load', resizeCanvases);
    
    // 导出 SHAPES 供绘图使用（取基础配置的 closed）
    const SHAPES = BASE_SHAPES;
  })();
</script>
</body>
</html>
